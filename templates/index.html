<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Email Fraud Detector</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{background:radial-gradient(circle at top,#1e1b4b,#020617)}
.glass{background:rgba(255,255,255,0.05);backdrop-filter:blur(25px);border:1px solid rgba(255,255,255,0.12)}
.border-glow{border:1px solid rgba(99,102,241,0.4);box-shadow:0 0 30px rgba(99,102,241,0.2)}
.fade-in{animation:fadeIn .6s ease-in-out}@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.pulse{animation:pulse 1.5s infinite}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
</style>
</head>
<body class="h-screen flex items-center justify-center text-white">
<div class="glass border-glow rounded-3xl p-6 w-full max-w-5xl h-[92vh] flex flex-col justify-between fade-in">
<div class="flex justify-between items-center">
<h1 class="text-2xl font-bold tracking-wide">⚡ AI Email Fraud Detector</h1>
<button onclick="toggleDark()" class="bg-white/10 px-4 py-1 rounded-lg hover:bg-white/20 transition">🌙</button>
</div>
<div id="dropZone" class="mt-3 border-2 border-dashed border-indigo-400 rounded-xl p-6 text-center cursor-pointer hover:bg-indigo-500/20 hover:scale-[1.02] transition">
<p class="text-lg font-semibold">📩 Drop Email File</p>
<p class="text-sm text-gray-400">or click to upload</p>
<input type="file" id="fileInput" class="hidden">
</div>
<p id="fileName" class="text-center text-indigo-300 text-sm mt-1"></p>
<button onclick="uploadEmail()" class="mt-2 w-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 py-2 rounded-xl font-semibold tracking-wide hover:scale-105 transition">🔍 Analyze Email</button>
<div id="loader" class="hidden flex justify-center mt-2"><div class="h-10 w-10 border-4 border-indigo-400 border-t-transparent rounded-full animate-spin"></div></div>
<div class="grid grid-cols-2 gap-4 mt-3 flex-1">
<div class="flex flex-col justify-between">
<div id="result" class="h-20 flex items-center justify-center rounded-xl text-lg font-bold tracking-wide bg-white/5 border border-white/10 pulse">Result will appear here...</div>
<canvas id="chart" class="hidden mt-4"></canvas>
</div>
<div id="previewBox" class="hidden flex flex-col bg-black/30 rounded-xl p-3 border border-white/10">
<h3 class="text-indigo-300 font-semibold mb-2">📄 Email Preview</h3>
<pre id="emailPreview" class="text-sm overflow-auto flex-1 leading-relaxed"></pre>
</div>
</div>
</div>
<script>
const dropZone=document.getElementById("dropZone"),fileInput=document.getElementById("fileInput"),fileName=document.getElementById("fileName");
dropZone.onclick=()=>fileInput.click();
dropZone.ondragover=e=>{e.preventDefault();dropZone.classList.add("bg-indigo-500/20")};
dropZone.ondragleave=()=>dropZone.classList.remove("bg-indigo-500/20");
dropZone.ondrop=e=>{e.preventDefault();fileInput.files=e.dataTransfer.files;fileName.innerText=fileInput.files[0].name;previewFile(fileInput.files[0])};
fileInput.onchange=()=>{fileName.innerText=fileInput.files[0].name;previewFile(fileInput.files[0])};
function previewFile(f){const r=new FileReader();r.onload=e=>{document.getElementById("previewBox").classList.remove("hidden");document.getElementById("emailPreview").innerText=e.target.result};r.readAsText(f)}
function toggleDark(){document.body.classList.toggle("bg-white");document.body.classList.toggle("text-black")}
async function uploadEmail(){
const resultBox=document.getElementById("result"),loader=document.getElementById("loader"),chartCanvas=document.getElementById("chart");
if(fileInput.files.length===0){alert("Please select a file");return}
const formData=new FormData();formData.append("file",fileInput.files[0]);
loader.classList.remove("hidden");resultBox.innerText="";
try{
const resp=await fetch("http://127.0.0.1:5000/check-email",{method:"POST",body:formData});
const data=await resp.json();
loader.classList.add("hidden");
let isFraud=data.final_prediction.includes("Fraud");
resultBox.innerHTML=`<span class="${isFraud?'text-red-400':'text-green-400'}">${data.final_prediction}</span>`;
chartCanvas.classList.remove("hidden");
if(window.myChart)window.myChart.destroy();
window.myChart=new Chart(chartCanvas,{type:"doughnut",data:{labels:["Fraud","Legitimate"],datasets:[{data:[data.fraud_probability_percent,data.legitimate_probability_percent]}]},options:{plugins:{legend:{labels:{color:"white"}}}}});
}catch(e){loader.classList.add("hidden");resultBox.innerText="❌ Backend connection failed"}
}
</script>
</body>
</html>
